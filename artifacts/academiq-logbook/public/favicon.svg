<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4338ca"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  
  <!-- Mortarboard top (diamond shape) -->
  <polygon points="16,5 28,11.5 16,18 4,11.5" fill="white"/>
  
  <!-- Cap stem -->
  <rect x="15" y="11" width="2" height="9" fill="white" opacity="0.9"/>
  
  <!-- Tassel string -->
  <line x1="26" y1="11.5" x2="26" y2="18" stroke="white" stroke-width="1.2" opacity="0.85" stroke-linecap="round"/>
  <!-- Tassel end -->
  <circle cx="26" cy="19" r="1.8" fill="#a5b4fc"/>
  <line x1="25" y1="20.5" x2="24.5" y2="23" stroke="#a5b4fc" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="26" y1="20.8" x2="26" y2="23.5" stroke="#a5b4fc" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="27" y1="20.5" x2="27.5" y2="23" stroke="#a5b4fc" stroke-width="0.8" stroke-linecap="round"/>
  
  <!-- Open book at bottom -->
  <path d="M7,22 Q16,19 16,19 Q16,19 25,22 L25,28 Q16,25 16,25 Q16,25 7,28 Z" fill="white" opacity="0.9"/>
  <line x1="16" y1="19" x2="16" y2="25" stroke="#6366f1" stroke-width="0.8"/>
</svg>
