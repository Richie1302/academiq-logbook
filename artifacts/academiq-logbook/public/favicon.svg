<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#4f46e5"/>
  
  <!-- Graduation cap board (mortarboard top) -->
  <polygon points="16,7 28,13 16,19 4,13" fill="white" opacity="0.95"/>
  
  <!-- Cap button on top -->
  <circle cx="16" cy="7" r="1.5" fill="#a5b4fc"/>
  
  <!-- Left side of cap (body) -->
  <rect x="13.5" y="13" width="5" height="1.5" rx="0.5" fill="white" opacity="0.7"/>
  
  <!-- Diploma scroll hanging from right -->
  <line x1="26" y1="13" x2="26" y2="19" stroke="white" stroke-width="1.5" opacity="0.8"/>
  <rect x="24" y="19" width="4" height="3" rx="1" fill="#a5b4fc"/>
  
  <!-- Standing pillar (person under cap) -->
  <rect x="14.5" y="14.5" width="3" height="7" rx="1" fill="white" opacity="0.85"/>
  
  <!-- Base/stage -->
  <rect x="10" y="22" width="12" height="2" rx="1" fill="white" opacity="0.6"/>
</svg>
