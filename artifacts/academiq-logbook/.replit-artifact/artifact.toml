kind = "web"
previewPath = "/"
title = "AcademiQ Logbook"
version = "1.0.0"
id = "artifacts/academiq-logbook"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21058

[services.development]
run = "pnpm --filter @workspace/academiq-logbook run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/academiq-logbook", "run", "build" ]
publicDir = "artifacts/academiq-logbook/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21058"
BASE_PATH = "/"
